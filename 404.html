    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {

      --dark: #110e0a;

    body {

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Background image */
    .bg-image {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .bg-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.2;
      filter: blur(2px);
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(17,14,10,0.8) 0%, rgba(17,14,10,0.95) 100%);
    }
    /* Grain */
    .grain::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");

    /* Content */
    .content {

      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    /* Logo */
    .logo {
      margin-bottom: 3rem;
    }
    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      display: block;
      line-height: 1.2;
    }
    .logo-ranch {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-top: 0.25rem;
    }
    /* Gold divider */
    .gold-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0 auto 2rem;
    }
    /* 404 number */
    .error-code {
      font-family: 'Playfair Display', serif;
      font-size: 8rem;
      font-weight: 700;
      color: var(--gold);
      opacity: 0.15;
      line-height: 1;
      margin-bottom: -1.5rem;
      letter-spacing: -0.02em;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 500;
      color: var(--cream);
      margin-bottom: 1rem;
    }
    .error-title em {
      font-style: italic;
      color: var(--gold);
    }
    .error-text {
      font-size: 1rem;
      color: rgba(240, 230, 211, 0.6);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      font-weight: 300;
    }
    /* Links */
    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .nav-links a {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .nav-links a.primary {
      background: var(--gold);
      color: var(--dark);
    }
    .nav-links a.primary:hover {
      background: #d4a44e;
      box-shadow: 0 0 24px rgba(201, 148, 62, 0.3);
    }
    .nav-links a.secondary {
      border: 1px solid rgba(201, 148, 62, 0.3);
      color: var(--gold);
    }
    .nav-links a.secondary:hover {
      border-color: var(--gold);
      background: rgba(201, 148, 62, 0.08);
    }
    /* Footer contact */
    .footer-contact {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: rgba(240, 230, 211, 0.35);
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.1em;
    }
    .footer-contact a {
      color: rgba(201, 148, 62, 0.6);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .footer-contact a:hover {
      color: var(--gold);
    }
    /* Fade in */
    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards;
    }
    .fade-in:nth-child(2) { animation-delay: 0.15s; }
    .fade-in:nth-child(3) { animation-delay: 0.3s; }
    .fade-in:nth-child(4) { animation-delay: 0.45s; }
    .fade-in:nth-child(5) { animation-delay: 0.6s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 640px) {
      .error-code { font-size: 5rem; }
      .error-title { font-size: 1.5rem; }
      .nav-links a { padding: 0.6rem 1.25rem; font-size: 0.65rem; }
    }
  </style>
</head>
